<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 300" width="460" height="300" role="img" aria-labelledby="spicemLogoTitle">
  <title id="spicemLogoTitle">SPICEM logo</title>
  <defs>
    <!-- One continuous gradient painted across the whole icon's coordinate
         space, so every hexagon/node picks up the right slice of color. -->
    <linearGradient id="honeyGrad" gradientUnits="userSpaceOnUse" x1="40" y1="85" x2="240" y2="254">
      <stop offset="0%"  stop-color="#154360"/>
      <stop offset="45%" stop-color="#1a6b78"/>
      <stop offset="100%" stop-color="#4fbf8f"/>
    </linearGradient>
    <linearGradient id="nodeGrad" gradientUnits="userSpaceOnUse" x1="280" y1="90" x2="400" y2="260">
      <stop offset="0%"  stop-color="#146c73"/>
      <stop offset="100%" stop-color="#63c98a"/>
    </linearGradient>
    <marker id="arrowHead2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f8f7a"/>
    </marker>
  </defs>

  <!-- ============ Dissolving pixels: spatial data resolving into structure ============ -->
  <g fill="#5fb8c9">
    <rect x="6"  y="150" width="4" height="4" opacity="0.30"/>
    <rect x="14" y="138" width="5" height="5" opacity="0.35"/>
    <rect x="12" y="164" width="4" height="4" opacity="0.30"/>
    <rect x="22" y="120" width="6" height="6" opacity="0.42"/>
    <rect x="24" y="176" width="5" height="5" opacity="0.38"/>
    <rect x="32" y="102" width="6" height="6" opacity="0.48"/>
    <rect x="34" y="150" width="7" height="7" opacity="0.5"/>
    <rect x="30" y="192" width="6" height="6" opacity="0.44"/>
    <rect x="44" y="88"  width="7" height="7" opacity="0.55"/>
    <rect x="46" y="204" width="7" height="7" opacity="0.5"/>
    <rect x="50" y="128" width="8" height="8" opacity="0.62"/>
    <rect x="48" y="170" width="7" height="7" opacity="0.58"/>
  </g>

  <!-- ============ Honeycomb cluster (spatial cellular environment) ============ -->
  <g fill="url(#honeyGrad)" stroke="#0d2b3a" stroke-width="1.2" opacity="0.96">
    <polygon points="172.52,163.00 150.00,176.00 127.48,163.00 127.48,137.00 150.00,124.00 172.52,137.00"/>
    <polygon points="217.55,163.00 195.03,176.00 172.52,163.00 172.52,137.00 195.03,124.00 217.55,137.00"/>
    <polygon points="195.03,202.00 172.52,215.00 150.00,202.00 150.00,176.00 172.52,163.00 195.03,176.00"/>
    <polygon points="150.00,202.00 127.48,215.00 104.97,202.00 104.97,176.00 127.48,163.00 150.00,176.00"/>
    <polygon points="127.48,163.00 104.97,176.00 82.45,163.00 82.45,137.00 104.97,124.00 127.48,137.00"/>
    <polygon points="150.00,124.00 127.48,137.00 104.97,124.00 104.97,98.00 127.48,85.00 150.00,98.00"/>
    <polygon points="195.03,124.00 172.52,137.00 150.00,124.00 150.00,98.00 172.52,85.00 195.03,98.00"/>
    <polygon points="240.07,202.00 217.55,215.00 195.03,202.00 195.03,176.00 217.55,163.00 240.07,176.00"/>
    <polygon points="104.97,202.00 82.45,215.00 59.93,202.00 59.93,176.00 82.45,163.00 104.97,176.00"/>
    <polygon points="172.52,241.00 150.00,254.00 127.48,241.00 127.48,215.00 150.00,202.00 172.52,215.00"/>
  </g>

  <!-- ============ Connecting swoosh: the metabolic-inference thread linking
       spatial structure (hexagons) to the modeled network (nodes) ============ -->
  <path d="M 70,225 C 110,265 200,270 250,240 S 330,215 360,235"
        fill="none" stroke="#2f8f7a" stroke-width="4" stroke-linecap="round" opacity="0.55"/>

  <!-- ============ Inference node-network (metabolic modeling) ============ -->
  <g stroke="#2f8f7a" stroke-width="2.4" fill="none" opacity="0.9">
    <path d="M 300,100 L 300,140" marker-end="url(#arrowHead2)" stroke-dasharray="1 6"/>
    <path d="M 300,148 L 275,178" marker-end="url(#arrowHead2)"/>
    <path d="M 268,190 L 268,220" marker-end="url(#arrowHead2)" stroke-dasharray="5 4"/>
    <path d="M 278,190 L 355,150" marker-end="url(#arrowHead2)"/>
    <path d="M 278,196 L 350,232" marker-end="url(#arrowHead2)"/>
  </g>
  <g fill="url(#nodeGrad)" stroke="#0d2b3a" stroke-width="1.2">
    <circle cx="300" cy="92"  r="11"/>
    <circle cx="300" cy="148" r="11"/>
    <circle cx="268" cy="186" r="11"/>
    <circle cx="268" cy="228" r="10"/>
    <circle cx="360" cy="145" r="11"/>
    <circle cx="356" cy="238" r="11"/>
  </g>

  <!-- ============ Wordmark ============ -->
  <g font-family="Helvetica, Arial, sans-serif">
    <text x="30" y="292" font-size="52" font-weight="700" fill="#0f3f4a" letter-spacing="2">SPICEM</text>
  </g>
</svg>
